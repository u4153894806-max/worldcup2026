<title>Coupe du Monde 2026 — Pronostics</title>
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f7f9fc;
    --border: #dde3ee;
    --accent: #c47d00;
    --accent2: #2563eb;
    --text: #1a2236;
    --muted: #6b7a99;
    --green: #16a34a;
    --red: #dc2626;
    --purple: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e3a5f 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  header .subtitle { color: var(--muted); font-size: 0.85rem; }

  nav {
    display: flex; gap: 6px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; overflow-x: auto;
  }
  nav button {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 14px 18px; font-size: 0.9rem; font-weight: 600; white-space: nowrap;
    border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding: 24px 32px; }
  .page.active { display: block; }

  /* ── GROUPES ── */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .group-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .group-header {
    background: linear-gradient(90deg, var(--accent2), #1e40af);
    padding: 10px 16px; font-weight: 800; font-size: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .group-matches { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .match-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .match-card:hover { border-color: var(--accent2); }
  .match-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-size: 0.75rem; color: var(--muted);
  }
  .match-teams {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 10px 14px; gap: 8px;
  }
  .team-side { display: flex; align-items: center; gap: 8px; }
  .team-side.right { flex-direction: row-reverse; text-align: right; }
  .flag { font-size: 1.8rem; }
  .team-name { font-weight: 700; font-size: 0.95rem; }
  .team-code { font-size: 0.75rem; color: var(--muted); }
  .vs { color: var(--accent); font-weight: 900; font-size: 0.9rem; text-align: center; }
  .score-input {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px 10px; justify-content: center;
  }
  .score-input input {
    width: 42px; text-align: center; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 1.1rem; font-weight: 700;
    padding: 5px; outline: none; transition: border-color 0.2s;
  }
  .score-input input:focus { border-color: var(--accent); }
  .score-sep { color: var(--muted); font-weight: 700; }

  .toggle-squad {
    width: 100%; background: none; border: none; border-top: 1px solid var(--border);
    color: var(--muted); cursor: pointer; padding: 7px;
    font-size: 0.78rem; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .toggle-squad:hover { background: var(--border); color: var(--text); }
  .squad-panel { display: none; padding: 10px 12px; border-top: 1px solid var(--border); }
  .squad-panel.open { display: block; }
  .squad-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .squad-team-title { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; display: flex; gap: 6px; align-items: center; }

  .player-list { display: flex; flex-direction: column; gap: 3px; }
  .player-item {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 7px; border-radius: 6px; cursor: default;
    position: relative; transition: background 0.15s;
    font-size: 0.8rem;
  }
  .player-item:hover { background: var(--border); }
  .player-pos {
    width: 26px; text-align: center; font-size: 0.65rem; font-weight: 700;
    border-radius: 4px; padding: 2px 0;
  }
  .pos-GK { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .pos-DEF { background: #0284c722; color: #38bdf8; border: 1px solid #0284c744; }
  .pos-MIL { background: #15803d22; color: #4ade80; border: 1px solid #15803d44; }
  .pos-ATT { background: #c2410c22; color: #fb923c; border: 1px solid #c2410c44; }
  .player-name { flex: 1; font-weight: 500; }
  .starter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .starter-dot.starter { background: var(--green); }
  .starter-dot.sub { background: var(--muted); }

  /* ── TOOLTIP ── */
  .tooltip {
    display: none;
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: calc(100% + 8px);
    background: #ffffff; border: 1px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-radius: 10px; padding: 10px 14px;
    width: 220px; z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--accent);
  }
  .player-item:hover .tooltip { display: block; }
  .tt-name { font-weight: 800; font-size: 0.9rem; margin-bottom: 6px; color: var(--text); }
  .tt-club { font-size: 0.82rem; color: var(--accent); margin-bottom: 6px; }
  .tt-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 5px; margin-top: 2px; gap: 10px; }
  .tt-stat { display: flex; flex-direction: column; align-items: center; }
  .tt-stat strong { color: var(--text); font-size: 1rem; }
  .tt-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; }
  .tt-status.starter { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
  .tt-status.sub { background: #71717a22; color: #a1a1aa; border: 1px solid #71717a44; }

  /* ── PHASES ── */
  .phase-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--accent); }
  .bracket-round { margin-bottom: 32px; }
  .round-title { font-size: 1rem; font-weight: 700; color: var(--accent2); margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .matches-row { display: flex; flex-wrap: wrap; gap: 14px; }
  .match-ko {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; min-width: 280px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .match-ko:hover { border-color: var(--accent2); }
  .match-ko .match-header { font-size: 0.72rem; }
  .match-ko .match-teams { padding: 8px 12px; }
  .match-ko .flag { font-size: 1.5rem; }
  .match-ko .team-name { font-size: 0.88rem; }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border: none; }
  .stat-rank { width: 20px; text-align: center; font-size: 0.75rem; color: var(--muted); }
  .stat-flag { font-size: 1.1rem; }
  .stat-info { flex: 1; }
  .stat-player { font-size: 0.85rem; font-weight: 600; }
  .stat-team { font-size: 0.72rem; color: var(--muted); }
  .stat-value { font-weight: 800; font-size: 1rem; color: var(--accent); }

  .search-bar {
    width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 0.9rem; outline: none;
    margin-bottom: 20px; transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--accent); }
  .no-result { color: var(--muted); font-size: 0.9rem; padding: 20px 0; }

  .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .badge-host { background: var(--accent); color: #000; font-size: 0.62rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
</style>
</head>

// Matchs par groupe (round-robin)
function getGroupMatches(teams) {
  const m = [];
  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      m.push([teams[i], teams[j]]);
    }
  }
  return m;
}

// ════════════════════════════════════════════════════════
//  R E N D E R  JOUEUR
// ════════════════════════════════════════════════════════
function renderPlayer(p, goalOrMatch = 'both') {
  const posClass = `pos-${p.pos}`;
  const starterClass = p.starter ? 'starter' : 'sub';
  const starterLabel = p.starter ? 'Titulaire' : 'Remplaçant';
  return `
  <div class="player-item">
    <span class="player-pos ${posClass}">${p.pos}</span>
    <span class="player-name">${p.name}</span>
    <span class="starter-dot ${starterClass}"></span>
    <div class="tooltip">
      <div class="tt-name">${p.name}</div>
      <div class="tt-club">🏟️ ${p.club}</div>
      <div>
        <span class="tt-status ${starterClass}">
          <span class="starter-dot ${starterClass}" style="display:inline-block"></span>
          ${starterLabel}
        </span>
      </div>
      <div class="tt-row">
        <div class="tt-stat"><strong>${p.matches}</strong><span>Matchs</span></div>
        <div class="tt-stat"><strong>${p.goals}</strong><span>${p.pos === 'GK' || p.pos === 'DEF' ? 'Buts' : p.pos === 'MIL' ? 'Buts' : 'Buts'}</span></div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  R E N D E R  MATCH  avec effectif
// ════════════════════════════════════════════════════════
let matchIdCounter = 0;
function renderMatchCard(home, away, label = '', venue = '') {
  const h = teamData(home);
  const a = teamData(away);
  const mid = `m${++matchIdCounter}`;

  const homePlayers = h.players.map(p => renderPlayer(p)).join('');
  const awayPlayers = a.players.map(p => renderPlayer(p)).join('');

  const hostBadge = (t) => t.host ? `<span class="badge-host">HÔTE</span>` : '';

  return `
  <div class="match-card">
    <div class="match-header">
      <span>${label}</span>
      <span>${venue}</span>
    </div>
    <div class="match-teams">
      <div class="team-side">
        <span class="flag">${flagHtml(h.flag)}</span>
        <div>
          <div class="team-name">${h.name} ${hostBadge(h)}</div>
          <div class="team-code">${home}</div>
        </div>
      </div>
      <div class="vs">VS</div>
      <div class="team-side right">
        <span class="flag">${flagHtml(a.flag)}</span>
        <div>
          <div class="team-name">${a.name} ${hostBadge(a)}</div>
          <div class="team-code">${away}</div>
        </div>
      </div>
    </div>
    <div class="score-input">
      <input type="number" min="0" max="20" placeholder="–" title="${h.name}" id="${mid}-h">
      <span class="score-sep">:</span>
      <input type="number" min="0" max="20" placeholder="–" title="${a.name}" id="${mid}-a">
    </div>
    ${h.players.length || a.players.length ? `
    <button class="toggle-squad" onclick="toggleSquad('${mid}')">
      <span id="${mid}-icon">▼</span> Voir les effectifs
    </button>
    <div class="squad-panel" id="${mid}-squad">
      <div class="squad-cols">
        <div>
          <div class="squad-team-title">${flagHtml(h.flag)} ${h.name}</div>
          <div class="player-list">${homePlayers || '<span style="color:var(--muted);font-size:0.8rem">Effectif à venir</span>'}</div>
        </div>
        <div>
          <div class="squad-team-title">${flagHtml(a.flag)} ${a.name}</div>
          <div class="player-list">${awayPlayers || '<span style="color:var(--muted);font-size:0.8rem">Effectif à venir</span>'}</div>
        </div>
      </div>
    </div>` : ''}
  </div>`;
}

function toggleSquad(mid) {
  const panel = document.getElementById(`${mid}-squad`);
  const icon = document.getElementById(`${mid}-icon`);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  icon.textContent = open ? '▲' : '▼';
}

// ════════════════════════════════════════════════════════
//  B U I L D  GROUPES
// ════════════════════════════════════════════════════════
function buildGroups() {
  const container = document.getElementById('groups-container');
  let html = '';

  [...GROUPS, ...PLACEHOLDER_GROUPS].forEach(g => {
    const matches = getGroupMatches(g.teams);
    let matchesHtml = matches.map((m, i) =>
      renderMatchCard(m[0], m[1], `Journée ${Math.ceil((i+1)/2)}`, g.venue)
    ).join('');

    const teamBadges = g.teams.map(code => {
      const t = teamData(code);
      return `<span title="${t.name}">${flagHtml(t.flag)} ${t.name}</span>`;
    }).join(' · ');

    html += `
    <div class="group-card">
      <div class="group-header">
        <span>GROUPE ${g.id}</span>
        <span style="font-size:0.75rem;font-weight:400;opacity:0.8">${teamBadges}</span>
      </div>
      <div class="group-matches">${matchesHtml}</div>
    </div>`;
  });
  container.innerHTML = html;
}

function buildPhase(containerId, rounds) {
  const container = document.getElementById(containerId);
  if (!rounds || rounds.length === 0 || rounds.every(r => !r.matches || r.matches.length === 0)) {
    container.innerHTML = "<div style=\"text-align:center;padding:60px 20px;color:var(--muted)\">  <div style=\"font-size:3rem;margin-bottom:16px\">⏳</div>  <div style=\"font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:8px\">Pas encore commencé</div>  <div style=\"font-size:0.9rem\">Cette phase sera disponible à l'issue de la phase de groupes.<br>  Le tournoi démarre le <strong style=\"color:var(--accent)\">11 juin 2026</strong>.</div></div>";
    return;
  }
  let html = '';
  rounds.forEach(round => {
    let matchesHtml = round.matches.map(m =>
      `<div class="match-ko">${renderMatchCard(m[0], m[1], round.label, m[2] || '')}</div>`
    ).join('');
    html += `
    <div class="bracket-round">
      <div class="round-title">${round.label}</div>
      <div class="matches-row">${matchesHtml}</div>
    </div>`;
  });
  container.innerHTML = html;
}

function filterSquad(query) {
  const q = query.toLowerCase().trim();
  const code = document.getElementById('country-select').value;
  if (!code && q) return;
  document.querySelectorAll('.player-searchable').forEach(el => {
    const match = !q || el.dataset.name.includes(q) || el.dataset.club.includes(q);
    el.style.display = match ? '' : 'none';
  });
});
}

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
